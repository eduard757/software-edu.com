<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defensa Tesis | Charlles Salcedo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="menu-globos">
    <div class="globo" onclick="mostrarSeccion('fase-video')">¿Qué es?</div>
    <div class="globo" onclick="mostrarSeccion('fase-tipos')">Tipos</div>
    <div class="globo" onclick="mostrarSeccion('fase-ventajas')">Ventajas</div>
    <div class="globo" onclick="mostrarSeccion('fase-evaluacion')">Evaluación</div>
    <div class="globo" onclick="mostrarSeccion('fase-musica')">Música</div>
</nav>

    <header>
        <div class="robot-box">
            <img src="assets/images/robot.png" alt="Robot" class="robot-animado" id="robot-img">
            <div class="burbuja-texto" id="mensaje">
                ¡Hola! Haz clic en cualquier parte para que me presente.
            </div>
        </div>
        <div class="login-box">
            <input type="text" id="nombreUsuario" placeholder="Tu nombre aquí...">
            <button onclick="comenzar()">Iniciar Presentación</button>
        </div>
    </header>

    <main>
        <section id="fase-video" class="seccion-fase">
            <h2 class="titulo-neon">¿Qué es el Software Educativo?</h2>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/S28Z_9pL6tY" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section id="fase-tipos" class="seccion-fase" style="display:none;">
            <h2 class="titulo-neon">Tipos de Software</h2>
            <img src="assets/images/tipos1.jpg" class="img-3d">
        </section>

        <section id="fase-ventajas" class="seccion-fase" style="display:none;">
            <h2 class="titulo-neon">Ventajas Tecnológicas</h2>
            <img src="assets/images/ventajas.jpg" class="img-3d">
        </section>

        <section id="fase-evaluacion" class="seccion-fase" style="display:none;">
            <h2 class="titulo-neon">Evaluación del Sistema</h2>
            <p>Análisis de métricas y usabilidad en el aula.</p>
        </section>

        <section id="fase-musica" class="seccion-fase" style="display:none;">
            <h2 class="titulo-neon">Música de Cierre</h2>
            <audio controls><source src="assets/music/fondo.mp3" type="audio/mpeg"></audio>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
