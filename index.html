<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Educativo | Charlles Salcedo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="bienvenida">
        <div class="robot-box">
            <img src="assets/images/robot.png" alt="Robot" class="robot" id="robot-img">
            <div class="burbuja" id="mensaje">
                ¡Hola! Bienvenido a la página de <strong>Charlles Salcedo</strong>. Somos el software educativo que tú necesitas.
            </div>
        </div>
        
        <div class="interaccion">
            <input type="text" id="nombreUsuario" placeholder="Ingresa tu nombre...">
            <button onclick="comenzar()">Ingresar</button>
        </div>
    </header>

    <main>
        <section class="contenido">
            <h2>¿Qué es el Software Educativo?</h2>
            <p>Es una herramienta interactiva diseñada para facilitar la enseñanza y el aprendizaje.</p>
            
            <div class="media">
                <video controls poster="assets/images/portada-video.jpg">
                    <source src="assets/video/explicacion.mp4" type="video/mp4">
                    Tu navegador no soporta videos.
                </video>
            </div>
        </section>
    </main>

    <audio id="musica" loop>
        <source src="assets/music/fondo.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
